<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockAI 智能分析系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ======================== NEW LAYOUT STYLES ======================== */
        :root {
            --nav-height: 56px;
            --market-bar-height: 44px;
            --bg-dark: #0b1120;
            --bg-card: rgba(18, 28, 50, 0.7);
            --border-glow: rgba(59, 130, 246, 0.15);
            --text-dim: #99aabc;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== TOP NAV ===== */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--nav-height);
            padding: 0 24px;
            background: rgba(11, 17, 32, 0.95);
            border-bottom: 1px solid rgba(59, 130, 246, 0.12);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-brand i {
            -webkit-text-fill-color: var(--accent-gold);
            font-size: 24px;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.04);
            padding: 4px;
            border-radius: 12px;
        }

        .nav-tab {
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #b8cce0;
            transition: all 0.25s;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-tab:hover { color: #d0e4f5; background: rgba(255,255,255,0.07); }
        .nav-tab.active {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            box-shadow: 0 0 16px rgba(59,130,246,0.15);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .admin-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            margin-left: 4px;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ===== MARKET BAR ===== */
        .market-bar {
            display: flex;
            gap: 24px;
            padding: 10px 24px;
            background: rgba(18, 28, 50, 0.6);
            border-bottom: 1px solid rgba(59, 130, 246, 0.06);
            font-size: 13px;
            overflow-x: auto;
            align-items: center;
        }

        .market-item {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .market-name { color: var(--text-dim); font-weight: 500; }
        .market-value { font-weight: 700; font-size: 14px; }
        .market-change { font-weight: 600; font-size: 12px; }
        .market-change.up { color: var(--accent-green); }
        .market-change.down { color: var(--accent-red); }

        /* ===== MAIN 3-COL LAYOUT ===== */
        .app-grid {
            display: grid;
            grid-template-columns: 240px 1fr 280px;
            gap: 12px;
            padding: 12px;
            max-width: 100vw;
            min-height: calc(100vh - var(--nav-height) - var(--market-bar-height));
        }

        /* Left Panel - Watchlist */
        .panel-left {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-glow);
            padding: 16px;
            overflow-y: auto;
            max-height: calc(100vh - var(--nav-height) - var(--market-bar-height) - 24px);
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .watchlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .watchlist-item:hover {
            background: rgba(59, 130, 246, 0.06);
            border-color: rgba(59, 130, 246, 0.12);
        }

        .watchlist-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .wl-left { display: flex; align-items: center; gap: 8px; }
        .wl-symbol { font-weight: 600; font-size: 13px; }
        .wl-name { font-size: 11px; color: var(--text-dim); }
        .wl-price { font-weight: 700; font-size: 14px; text-align: right; }
        .wl-change { font-size: 11px; font-weight: 500; text-align: right; }
        .wl-change.up { color: var(--accent-green); }
        .wl-change.down { color: var(--accent-red); }
        .wl-arrow { font-size: 10px; }
        .wl-arrow.up { color: var(--accent-green); }
        .wl-arrow.down { color: var(--accent-red); }

        /* Center Panel */
        .panel-center {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chart-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-glow);
            padding: 16px;
            flex: 1;
        }

        .chart-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .chart-tabs {
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.25);
            padding: 3px;
            border-radius: 8px;
        }

        .chart-tab {
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-dim);
            transition: all 0.2s;
            border: none;
            background: transparent;
        }

        .chart-tab:hover { color: #99aabc; }
        .chart-tab.active { background: var(--accent-blue); color: white; }

        .indicator-tags {
            display: flex;
            gap: 6px;
        }

        .indicator-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255,255,255,0.04);
            color: var(--text-dim);
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .indicator-tag:hover { border-color: rgba(59,130,246,0.2); }
        .indicator-tag.active { background: rgba(59,130,246,0.12); color: #60a5fa; border-color: rgba(59,130,246,0.25); }

        .chart-container { height: 340px; }

        /* Right Panel - Capital Flow */
        .panel-right {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-glow);
            padding: 16px;
            overflow-y: auto;
            max-height: calc(100vh - var(--nav-height) - var(--market-bar-height) - 24px);
        }

        .cf-section { margin-bottom: 18px; }
        .cf-section:last-child { margin-bottom: 0; }
        .cf-section-title { font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 10px; }

        .cf-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }

        .cf-label { color: #99aabc; }
        .cf-value { font-weight: 600; }
        .cf-value.positive { color: var(--accent-green); }
        .cf-value.negative { color: var(--accent-red); }

        .cf-sector {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .cf-sector:last-child { border-bottom: none; }
        .cf-sector-name { color: #99aabc; }

        .cf-detail-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 12px;
            color: #99aabc;
        }

        .cf-detail-item .cf-value { font-size: 13px; }

        /* ===== BOTTOM 3-COL ===== */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1.4fr 0.8fr;
            gap: 12px;
            padding: 0 12px 12px;
            max-width: 100vw;
        }

        .bottom-card {
            background: var(--bg-card);
            border-radius: 14px;
            border: 1px solid var(--border-glow);
            padding: 14px 16px;
        }

        .bottom-card-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-signal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 13px;
        }

        .ai-signal-item:last-child { border-bottom: none; }

        .signal-badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .signal-badge.buy { background: rgba(16,185,129,0.15); color: var(--accent-green); }
        .signal-badge.sell { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .signal-badge.hold { background: rgba(153,170,188,0.15); color: #99aabc; }

        .signal-conf { font-size: 11px; color: var(--text-dim); }

        .news-item-sm {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .news-item-sm:last-child { border-bottom: none; }
        .news-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .news-dot.positive { background: var(--accent-green); }
        .news-dot.negative { background: var(--accent-red); }
        .news-dot.neutral { background: #94a3b8; }
        .news-sm-title { flex: 1; color: #cbd5e1; }

        .quick-action-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 10px;
            border: 1px solid rgba(59,130,246,0.1);
            background: rgba(59,130,246,0.05);
            color: #99aabc;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .quick-action-btn:hover {
            background: rgba(59,130,246,0.12);
            border-color: rgba(59,130,246,0.2);
            color: #e2e8f0;
        }

        .quick-action-btn i { margin-right: 6px; }

        /* ===== TAB PAGE CONTENT (hidden by default) ===== */
        .tab-page { display: none; }
        .tab-page.active { display: block; }

        /* ===== CAPITAL FLOW PAGE ===== */
        .cf-page-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px;
        }

        .cf-full-card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-glow);
            padding: 20px;
        }

        .cf-page-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cf-trend-chart { height: 250px; }

        .top-stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 13px;
        }

        .top-stock-item:last-child { border-bottom: none; }

        .south-north-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .sn-item {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .sn-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        .sn-value { font-size: 18px; font-weight: 700; }
        .sn-value.positive { color: var(--accent-green); }
        .sn-value.negative { color: var(--accent-red); }

        /* ===== ANALYSIS PAGE ===== */
        .analysis-page {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            padding: 16px;
        }

        /* ===== STRATEGY PAGE ===== */
        .strategy-page {
            padding: 16px;
        }

        /* ===== REPORT PAGE ===== */
        .report-page {
            padding: 16px;
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .cf-skeleton {
            padding: 12px;
        }

        .cf-skeleton-item {
            height: 14px;
            background: rgba(153,170,188,0.08);
            border-radius: 4px;
            margin-bottom: 8px;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .app-grid { grid-template-columns: 200px 1fr 240px; }
        }

        @media (max-width: 992px) {
            .app-grid { grid-template-columns: 1fr; }
            .panel-left, .panel-right { max-height: none; }
            .bottom-grid { grid-template-columns: 1fr; }
            .cf-page-grid { grid-template-columns: 1fr; }
            .analysis-page { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .nav-tabs { display: none; }
            .market-bar { gap: 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

<!-- ===================== TOP NAV ===================== -->
<nav class="top-nav">
    <div class="nav-brand">
        <i class="bi bi-graph-up-arrow"></i>
        STOCK AI
    </div>
    <div class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-page="dashboard" onclick="switchTab('dashboard')">
            <i class="bi bi-columns-gap"></i> 儀表板
        </button>
        <button class="nav-tab" data-page="analysis" onclick="switchTab('analysis')">
            <i class="bi bi-search"></i> 個股分析
        </button>
        <button class="nav-tab" data-page="capital-flow" onclick="switchTab('capital-flow')">
            <i class="bi bi-cash-stack"></i> 資金流向
        </button>
        <button class="nav-tab" data-page="strategy" onclick="switchTab('strategy')">
            <i class="bi bi-lightning-charge"></i> 策略
        </button>
        <button class="nav-tab" data-page="report" onclick="switchTab('report')">
            <i class="bi bi-file-earmark-text"></i> 報告
        </button>
    </div>
    <div class="nav-right">
        <i class="bi bi-gear"></i>
        <span>Admin <span class="admin-dot"></span></span>
    </div>
</nav>

<!-- ===================== MARKET BAR ===================== -->
<div class="market-bar" id="marketBar">
    <div class="market-item"><span class="market-name">HSI</span><span class="market-value" id="hsiValue">--</span><span class="market-change" id="hsiChange">--</span></div>
    <div class="market-item"><span class="market-name">TECH</span><span class="market-value" id="techValue">--</span><span class="market-change" id="techChange">--</span></div>
    <div class="market-item"><span class="market-name">A50</span><span class="market-value" id="a50Value">--</span><span class="market-change" id="a50Change">--</span></div>
    <div class="market-item"><span class="market-name">SHCOMP</span><span class="market-value" id="shcompValue">--</span><span class="market-change" id="shcompChange">--</span></div>
    <div class="market-item" style="margin-left:auto;color:var(--text-dim);font-size:12px;">
        <i class="bi bi-clock"></i> <span id="marketTime">--</span>
    </div>
</div>

<!-- ===================== DASHBOARD TAB ===================== -->
<div class="tab-page active" id="page-dashboard">
    <div class="app-grid">
        <!-- LEFT: Watchlist -->
        <div class="panel-left" id="watchlistPanel">
            <div class="panel-title"><i class="bi bi-star-fill" style="color:var(--accent-gold);font-size:11px;"></i> 自選股 Watchlist</div>
            <div id="watchlistContainer">
                <div class="cf-skeleton">
                    <div class="cf-skeleton-item" style="width:90%"></div>
                    <div class="cf-skeleton-item" style="width:75%"></div>
                    <div class="cf-skeleton-item" style="width:85%"></div>
                    <div class="cf-skeleton-item" style="width:70%"></div>
                    <div class="cf-skeleton-item" style="width:80%"></div>
                </div>
            </div>
        </div>

        <!-- CENTER: K-line Chart -->
        <div class="panel-center">
            <div class="chart-card">
                <div class="chart-toolbar">
                    <div class="chart-tabs" id="klineTabs">
                        <button class="chart-tab active" onclick="changeKlinePeriod('daily')">日線</button>
                        <button class="chart-tab" onclick="changeKlinePeriod('weekly')">週線</button>
                        <button class="chart-tab" onclick="changeKlinePeriod('monthly')">月線</button>
                        <button class="chart-tab" onclick="changeKlinePeriod('1min')">1分</button>
                        <button class="chart-tab" onclick="changeKlinePeriod('5min')">5分</button>
                    </div>
                    <div class="indicator-tags">
                        <span class="indicator-tag active" data-indicator="ma" onclick="toggleIndicator('ma')">MA</span>
                        <span class="indicator-tag" data-indicator="rsi" onclick="toggleIndicator('rsi')">RSI</span>
                        <span class="indicator-tag" data-indicator="macd" onclick="toggleIndicator('macd')">MACD</span>
                        <span class="indicator-tag" data-indicator="bollinger" onclick="toggleIndicator('bollinger')">BB</span>
                    </div>
                </div>
                <div id="mainChart" class="chart-container"></div>
            </div>

            <!-- Stock info bar below chart -->
            <div style="display:flex;gap:12px;flex-wrap:wrap;" id="stockInfoBar">
                <div style="background:var(--bg-card);border-radius:12px;border:1px solid var(--border-glow);padding:10px 16px;display:flex;align-items:center;gap:14px;flex:1;">
                    <div><span style="font-size:12px;color:var(--text-dim);">現價</span><div style="font-size:22px;font-weight:700;" id="mainPrice">--</div></div>
                    <div style="width:1px;height:32px;background:rgba(255,255,255,0.06);"></div>
                    <div><span style="font-size:12px;color:var(--text-dim);">漲跌</span><div style="font-size:16px;font-weight:600;" id="mainChange">--</div></div>
                    <div style="width:1px;height:32px;background:rgba(255,255,255,0.06);"></div>
                    <div><span style="font-size:12px;color:var(--text-dim);">開盤</span><div style="font-size:16px;font-weight:600;" id="mainOpen">--</div></div>
                    <div style="width:1px;height:32px;background:rgba(255,255,255,0.06);"></div>
                    <div><span style="font-size:12px;color:var(--text-dim);">高低</span><div style="font-size:16px;font-weight:600;" id="mainRange">--</div></div>
                    <div style="width:1px;height:32px;background:rgba(255,255,255,0.06);"></div>
                    <div><span style="font-size:12px;color:var(--text-dim);">成交量</span><div style="font-size:16px;font-weight:600;" id="mainVolume">--</div></div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Capital Flow -->
        <div class="panel-right" id="capitalFlowPanel">
            <div class="cf-section">
                <div class="cf-section-title"><i class="bi bi-cash-coin" style="color:var(--accent-gold);"></i> 大市資金流向</div>
                <div id="marketCapFlow">
                    <div class="cf-skeleton">
                        <div class="cf-skeleton-item" style="width:60%"></div>
                        <div class="cf-skeleton-item" style="width:50%"></div>
                    </div>
                </div>
            </div>
            <div class="cf-section">
                <div class="cf-section-title"><i class="bi bi-arrow-left-right"></i> 板塊資金輪動</div>
                <div id="sectorFlow">
                    <div class="cf-skeleton">
                        <div class="cf-skeleton-item" style="width:70%"></div>
                        <div class="cf-skeleton-item" style="width:55%"></div>
                        <div class="cf-skeleton-item" style="width:65%"></div>
                    </div>
                </div>
            </div>
            <div class="cf-section">
                <div class="cf-section-title"><i class="bi bi-pie-chart"></i> 個股資金細節</div>
                <div id="stockCapFlow">
                    <div class="cf-skeleton">
                        <div class="cf-skeleton-item" style="width:45%"></div>
                        <div class="cf-skeleton-item" style="width:40%"></div>
                        <div class="cf-skeleton-item" style="width:50%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM 3-COL -->
    <div class="bottom-grid">
        <div class="bottom-card">
            <div class="bottom-card-title"><i class="bi bi-robot" style="color:var(--accent-blue);"></i> AI 信號</div>
            <div id="aiSignalsContainer">
                <div class="cf-skeleton">
                    <div class="cf-skeleton-item" style="width:80%"></div>
                    <div class="cf-skeleton-item" style="width:60%"></div>
                </div>
            </div>
        </div>
        <div class="bottom-card">
            <div class="bottom-card-title"><i class="bi bi-newspaper" style="color:var(--accent-green);"></i> 新聞 Sentiment</div>
            <div id="newsSentimentContainer">
                <div class="cf-skeleton">
                    <div class="cf-skeleton-item" style="width:75%"></div>
                    <div class="cf-skeleton-item" style="width:65%"></div>
                    <div class="cf-skeleton-item" style="width:55%"></div>
                </div>
            </div>
        </div>
        <div class="bottom-card">
            <div class="bottom-card-title"><i class="bi bi-lightning-charge" style="color:var(--accent-gold);"></i> 快速操作</div>
            <button class="quick-action-btn" onclick="quickAnalyzeStock()"><i class="bi bi-search"></i> 分析新股票</button>
            <button class="quick-action-btn" onclick="generateDailyReport()"><i class="bi bi-file-earmark-text"></i> 生成日報</button>
            <button class="quick-action-btn" onclick="switchTab('strategy')"><i class="bi bi-lightning-charge"></i> AI 策略</button>
        </div>
    </div>
</div>

<!-- ===================== ANALYSIS TAB ===================== -->
<div class="tab-page" id="page-analysis">
    <div class="analysis-page">
        <div class="cf-full-card" style="grid-column: 1 / -1;">
            <div style="display:flex;gap:12px;margin-bottom:16px;">
                <input type="text" id="analysisStockInput" class="stock-input" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border-glow);border-radius:12px;padding:12px 18px;color:white;font-size:15px;" placeholder="輸入股票代碼 (0700.HK, AAPL)" value="0700.HK">
                <button class="btn-analyze" onclick="analyzeSingleStock()" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:12px;padding:12px 28px;color:white;font-weight:600;cursor:pointer;">分析</button>
            </div>
            <div id="analysisResult">
                <div style="text-align:center;padding:40px;color:var(--text-dim);">
                    <i class="bi bi-search" style="font-size:48px;display:block;margin-bottom:12px;opacity:0.3;"></i>
                    輸入股票代碼開始分析
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===================== CAPITAL FLOW TAB ===================== -->
<div class="tab-page" id="page-capital-flow">
    <div class="cf-page-grid">
        <div class="cf-full-card" style="grid-column: 1 / -1;">
            <div class="cf-page-title"><i class="bi bi-graph-up"></i> 全市場資金趨勢</div>
            <div class="cf-trend-chart" id="capitalTrendChart"></div>
            <div style="display:flex;gap:8px;margin-top:10px;">
                <button class="chart-tab active" onclick="changeCapPeriod(5)">5日</button>
                <button class="chart-tab" onclick="changeCapPeriod(20)">20日</button>
                <button class="chart-tab" onclick="changeCapPeriod(60)">年初至今</button>
            </div>
        </div>

        <div class="cf-full-card">
            <div class="cf-page-title"><i class="bi bi-trophy"></i> 個股資金排行 Top 5</div>
            <div id="topStockFlow"></div>
        </div>

        <div class="cf-full-card">
            <div class="cf-page-title"><i class="bi bi-arrow-left-right"></i> 南北向資金</div>
            <div id="southNorthFlow"></div>
        </div>
    </div>
</div>

<!-- ===================== STRATEGY TAB ===================== -->
<div class="tab-page" id="page-strategy">
    <div class="strategy-page">
        <div class="cf-full-card">
            <div class="cf-page-title"><i class="bi bi-lightning-charge" style="color:var(--accent-gold);"></i> AI 交易策略</div>
            <div style="display:flex;gap:12px;margin-bottom:16px;">
                <input type="text" id="strategyStockInput" class="stock-input" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border-glow);border-radius:12px;padding:12px 18px;color:white;font-size:15px;" placeholder="股票代碼" value="0700.HK">
                <button class="btn-analyze" onclick="loadStrategy()" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:12px;padding:12px 28px;color:white;font-weight:600;cursor:pointer;">生成策略</button>
            </div>
            <div id="strategyResult">
                <div style="text-align:center;padding:40px;color:var(--text-dim);">
                    <i class="bi bi-lightning-charge" style="font-size:48px;display:block;margin-bottom:12px;opacity:0.3;"></i>
                    點擊「生成策略」獲取 AI 交易建議
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===================== REPORT TAB ===================== -->
<div class="tab-page" id="page-report">
    <div class="report-page">
        <div class="cf-full-card">
            <div class="cf-page-title"><i class="bi bi-file-earmark-text"></i> 分析報告</div>
            <div style="display:flex;gap:12px;margin-bottom:16px;">
                <input type="text" id="reportStockInput" class="stock-input" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border-glow);border-radius:12px;padding:12px 18px;color:white;font-size:15px;" placeholder="股票代碼" value="0700.HK">
                <button class="btn-analyze" onclick="generateReport()" style="background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:12px;padding:12px 28px;color:white;font-weight:600;cursor:pointer;">生成報告</button>
            </div>
            <div id="reportResult">
                <div style="text-align:center;padding:40px;color:var(--text-dim);">
                    <i class="bi bi-file-earmark-text" style="font-size:48px;display:block;margin-bottom:12px;opacity:0.3;"></i>
                    點擊「生成報告」獲取詳細分析
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
